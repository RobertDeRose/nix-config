name: Refresh Binary Cache

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CACHIX_CACHE: robertderose
  CACHIX_PUBLIC_KEY: robertderose.cachix.org-1:LGSby4A1Kg1W19IC5AoB3oGhLSgfg1x3j2GF0Ve2hKM=
  NIXOS_CACHE_KEY: cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
  NIX_COMMUNITY_KEY: nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
  NUMTIDE_KEY: niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

jobs:
  update-lock:
    runs-on: ubuntu-latest
    outputs:
      lock_changed: ${{ steps.lock_diff.outputs.changed }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
            extra-substituters = https://cache.nixos.org https://nix-community.cachix.org https://cache.numtide.com https://robertderose.cachix.org
            extra-trusted-public-keys = ${{ env.NIXOS_CACHE_KEY }} ${{ env.NIX_COMMUNITY_KEY }} ${{ env.NUMTIDE_KEY }} ${{ env.CACHIX_PUBLIC_KEY }}

      - name: Update flake inputs
        run: nix flake update

      - id: lock_diff
        name: Detect lockfile changes
        run: |
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          git diff --stat -- flake.lock >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: steps.lock_diff.outputs.changed == 'true'
        with:
          name: updated-flake-lock
          path: flake.lock
          if-no-files-found: error

  build-platforms:
    name: Build ${{ matrix.runs_on }}
    needs: update-lock
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        runs_on:
          - macos-latest
          - macos-15-intel
          - ubuntu-24.04-arm
          - ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: needs.update-lock.outputs.lock_changed == 'true'
        with:
          name: updated-flake-lock
          path: .

      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
            extra-substituters = https://cache.nixos.org https://nix-community.cachix.org https://cache.numtide.com https://robertderose.cachix.org
            extra-trusted-public-keys = ${{ env.NIXOS_CACHE_KEY }} ${{ env.NIX_COMMUNITY_KEY }} ${{ env.NUMTIDE_KEY }} ${{ env.CACHIX_PUBLIC_KEY }}

      - name: Push refresh package targets to Cachix
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          kernel="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m)"

          case "$arch" in
            arm64|aarch64) arch="aarch64" ;;
            x86_64) arch="x86_64" ;;
            *)
              echo "Unsupported architecture: $arch" >&2
              exit 1
              ;;
          esac

          target="$arch-$kernel"
          echo "Refreshing cache targets for $target"

          nix shell nixpkgs#cachix --command \
            bash .github/scripts/build-platform-targets.sh "$target" "$CACHIX_CACHE"

  commit-lock:
    needs:
      - update-lock
      - build-platforms
    if: needs.update-lock.outputs.lock_changed == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.update-pr.outputs.pr_number }}
    concurrency:
      group: refresh-lock-pr-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write

    steps:
      - id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.ROBBORG_APP_ID }}
          private-key: ${{ secrets.ROBBORG_PRIVATE_KEY }}

      - id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: steps.checkout.outputs.commit == github.sha
        with:
          name: updated-flake-lock
          path: .

      - id: update-pr
        name: Commit refreshed flake.lock
        if: steps.checkout.outputs.commit == github.sha
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git diff --quiet -- flake.lock; then
            echo "flake.lock already matches refreshed artifact"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="automation/refresh-flake-lock"
          remote_branch_sha="$(git ls-remote --heads origin "$branch" | awk '{print $1}')"

          git config user.name "robborg[bot]"
          git config user.email "robborg[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add flake.lock
          git commit -m "chore: refresh flake lock"

          if [ -n "$remote_branch_sha" ]; then
            git push --force-with-lease="refs/heads/$branch:$remote_branch_sha" origin "$branch"
          else
            git push --set-upstream origin "$branch"
          fi

          pr_number="$(gh pr list \
            --state open \
            --head "$branch" \
            --json number \
            --jq '.[0].number')"

          if [ -n "$pr_number" ] && [ "$pr_number" != "null" ]; then
            gh pr edit "$pr_number" \
              --title "chore: refresh flake lock" \
              --body "Automated flake.lock refresh after successful cache warmup."
          else
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore: refresh flake lock" \
              --body "Automated flake.lock refresh after successful cache warmup."

            pr_number="$(gh pr list \
              --state open \
              --head "$branch" \
              --json number \
              --jq '.[0].number')"
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

  hk-refresh:
    needs: commit-lock
    if: needs.commit-lock.outputs.pr_number != ''
    uses: ./.github/workflows/hk.yml
    with:
      ref: automation/refresh-flake-lock

  ci-refresh:
    needs: commit-lock
    if: needs.commit-lock.outputs.pr_number != ''
    uses: ./.github/workflows/ci.yml
    with:
      ref: automation/refresh-flake-lock

  merge-lock-pr:
    needs:
      - commit-lock
      - hk-refresh
      - ci-refresh
    if: needs.commit-lock.outputs.pr_number != ''
    runs-on: ubuntu-latest
    concurrency:
      group: refresh-lock-pr-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write

    steps:
      - id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.ROBBORG_APP_ID }}
          private-key: ${{ secrets.ROBBORG_PRIVATE_KEY }}

      - name: Merge refreshed flake.lock PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.commit-lock.outputs.pr_number }}
          GH_REPO: ${{ github.repository }}
        run: gh pr merge "$PR_NUMBER" --repo "$GH_REPO" --admin --squash
