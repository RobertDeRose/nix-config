name: Refresh Binary Cache

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CACHIX_CACHE: robertderose
  CACHIX_PUBLIC_KEY: robertderose.cachix.org-1:LGSby4A1Kg1W19IC5AoB3oGhLSgfg1x3j2GF0Ve2hKM=
  NIXOS_CACHE_KEY: cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
  NIX_COMMUNITY_KEY: nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
  NUMTIDE_KEY: niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

jobs:
  update-lock:
    runs-on: ubuntu-latest
    outputs:
      lock_changed: ${{ steps.lock_diff.outputs.changed }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
            extra-substituters = https://cache.nixos.org https://nix-community.cachix.org https://cache.numtide.com https://robertderose.cachix.org
            extra-trusted-public-keys = ${{ env.NIXOS_CACHE_KEY }} ${{ env.NIX_COMMUNITY_KEY }} ${{ env.NUMTIDE_KEY }} ${{ env.CACHIX_PUBLIC_KEY }}

      - name: Update flake inputs via mise
        run: nix shell nixpkgs#mise --command mise run nix:up

      - id: lock_diff
        name: Detect lockfile changes
        run: |
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          git diff --stat -- flake.lock >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: steps.lock_diff.outputs.changed == 'true'
        with:
          name: updated-flake-lock
          path: flake.lock
          if-no-files-found: error

  build-platforms:
    name: Build ${{ matrix.runs_on }}
    needs: update-lock
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        runs_on:
          - macos-latest
          - macos-15-intel
          - ubuntu-24.04-arm
          - ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: needs.update-lock.outputs.lock_changed == 'true'
        with:
          name: updated-flake-lock
          path: .github/artifacts/updated-flake-lock

      - name: Replace flake.lock with updated artifact
        if: needs.update-lock.outputs.lock_changed == 'true'
        run: mv .github/artifacts/updated-flake-lock/flake.lock flake.lock

      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ github.token }}
            extra-substituters = https://cache.nixos.org https://nix-community.cachix.org https://cache.numtide.com https://robertderose.cachix.org
            extra-trusted-public-keys = ${{ env.NIXOS_CACHE_KEY }} ${{ env.NIX_COMMUNITY_KEY }} ${{ env.NUMTIDE_KEY }} ${{ env.CACHIX_PUBLIC_KEY }}

      - name: Push refresh package targets to Cachix
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          kernel="$(uname -s | tr '[:upper:]' '[:lower:]')"
          arch="$(uname -m)"

          case "$arch" in
            arm64|aarch64) arch="aarch64" ;;
            x86_64) arch="x86_64" ;;
            *)
              echo "Unsupported architecture: $arch" >&2
              exit 1
              ;;
          esac

          target="$arch-$kernel"
          echo "Refreshing cache targets for $target"

          nix shell nixpkgs#cachix --command \
            bash .github/scripts/build-platform-targets.sh "$target" "$CACHIX_CACHE"
