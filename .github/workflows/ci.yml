name: Test Nix Config

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  bootstrap-and-validate:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        # Test with a generic hostname for CI
        hostname:
          - ci-linux-test
          - ci-macos-test
    steps:
      - uses: jdx/mise-action@v4
      - uses: cachix/install-nix-action@v31
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Bootstrap and validate
        env:
          repo: ${{ github.repository }}
          branch: ${{ github.head_ref || github.ref_name }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/${owner}/${repo}/${branch}/bootstrap.sh | bash -s -- ${{ matrix.hostname }}
