name: Test Nix Config

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check flake evaluates
        run: nix flake check --no-build

      - name: Build Darwin configurations (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          for host in $(nix eval --json '.#darwinConfigurations' 2>/dev/null | jq -r 'keys[]' 2>/dev/null); do
            echo "==> Building darwinConfigurations.$host"
            nix build ".#darwinConfigurations.$host.system" --no-link
          done

      - name: Build Linux system configurations (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          for host in $(nix eval --json '.#systemConfigs' 2>/dev/null | jq -r 'keys[]' 2>/dev/null); do
            echo "==> Building systemConfigs.$host"
            nix build ".#systemConfigs.$host.system" --no-link
          done

  bootstrap-steps:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Validate flake evaluates after install
        run: |
          curl -sSfL https://raw.githubusercontent.com/RobertDeRose/nix-config/main/bootstrap.sh | bash -s
