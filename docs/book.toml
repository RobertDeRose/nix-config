[book]
title = "Maison"
description = "Reproducible macOS and Linux system configuration with Nix flakes"
authors = ["Robert DeRose"]
language = "en"
src = "src"

[build]
build-dir = "../book"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/RobertDeRose/maison"
edit-url-template = "https://github.com/RobertDeRose/maison/edit/main/docs/{path}"
additional-css = ["theme/cobalt.css"]
