# mise.toml — task runner for nix-config
# Install mise: curl https://mise.run | sh
# List tasks:   mise tasks
# Run a task:   mise run <task> [args]

# ---------------------------------------------------------------------------
# Tools
# ---------------------------------------------------------------------------
[tools]
# Uncomment to pin tool versions:
# usage = "latest"

# ---------------------------------------------------------------------------
# Bootstrap & host management
# ---------------------------------------------------------------------------

[tasks.init]
description = "Full init for a new machine: install Nix (+ Homebrew on Mac), then apply config"
usage = '''
arg "<hostname>" help="Hostname to assign" long_help="The hostname used as the nix config identifier. Delegates to add-host to create the host directory, then installs prerequisites (Nix, Homebrew) and builds/activates the configuration."
'''
env = { NIX_INSTALLER_NO_CONFIRM = "true" }
run = """
#!/usr/bin/env bash
set -euo pipefail

HOSTNAME="${usage_hostname:?}"
OS="$(uname -s)"

# ------------------------------------------------------------------ #
# Create host directory (delegates to add-host)
# ------------------------------------------------------------------ #
mise run add-host "$HOSTNAME"

# Stage everything before the nix build
git checkout -b "host/$HOSTNAME" 2>/dev/null || true
git add -A

# ------------------------------------------------------------------ #
# macOS: install Homebrew if missing
# ------------------------------------------------------------------ #
if [ "$OS" = "Darwin" ]; then
  echo "==> Checking for Homebrew..."
  if ! command -v brew &>/dev/null; then
    echo "    Installing Homebrew..."
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
    echo >> ~/.zprofile
    echo 'eval "$(/opt/homebrew/bin/brew shellenv)"' >> ~/.zprofile
    eval "$(/opt/homebrew/bin/brew shellenv)"
  else
    echo "    Homebrew already installed, skipping."
  fi
fi

# ------------------------------------------------------------------ #
# Install Nix if missing
# ------------------------------------------------------------------ #
echo "==> Checking for Nix..."
if [ ! -e /nix/receipt.json ]; then
  echo "    Installing Nix via nix-installer..."
  curl -sSfL https://artifacts.nixos.org/nix-installer | sh -s -- install
else
  echo "    Nix already installed, skipping."
fi

source /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh

# ------------------------------------------------------------------ #
# Ensure the Nix daemon can find SSL certificates (fresh installs)
# https://github.com/NixOS/nix/issues/2899
# ------------------------------------------------------------------ #
if [ "$OS" = "Darwin" ]; then
  CERT_FILE="/nix/var/nix/profiles/default/etc/ssl/certs/ca-bundle.crt"
  if [ -e "$CERT_FILE" ]; then
    echo "==> Setting NIX_SSL_CERT_FILE on Nix daemon..."
    sudo launchctl setenv NIX_SSL_CERT_FILE "$CERT_FILE"
    sudo launchctl kickstart -k system/org.nixos.nix-daemon
    sleep 2
  fi
fi

# ------------------------------------------------------------------ #
# Build and activate
# ------------------------------------------------------------------ #
if [ "$OS" = "Darwin" ]; then
  echo "==> Building and activating Darwin configuration for '$HOSTNAME'..."
  nix build ".#darwinConfigurations.$HOSTNAME.system" \\
    --extra-experimental-features 'nix-command flakes'
  sudo -E ./result/sw/bin/darwin-rebuild switch --flake ".#$HOSTNAME"
else
  echo "==> Building and activating NixOS configuration for '$HOSTNAME'..."
  sudo nixos-rebuild switch --flake ".#$HOSTNAME" \\
    --extra-experimental-features 'nix-command flakes'
fi

git add -A
git commit -m "chore: bootstrap $HOSTNAME" 2>/dev/null || true
echo ""
echo "Done! Open a new shell to pick up all changes."
"""

[tasks.switch]
description = "Apply the nix config for the current host (auto-detects Darwin or NixOS)"
run = """
#!/usr/bin/env bash
set -euo pipefail
HOST="$(hostname -s)"
if [ "$(uname -s)" = "Darwin" ]; then
  darwin-rebuild switch --flake ".#$HOST"
else
  sudo nixos-rebuild switch --flake ".#$HOST"
fi
"""

[tasks.debug]
description = "Apply the nix config with verbose output for debugging"
run = """
#!/usr/bin/env bash
set -euo pipefail
HOST="$(hostname -s)"
if [ "$(uname -s)" = "Darwin" ]; then
  darwin-rebuild switch --flake ".#$HOST" --show-trace --verbose
else
  sudo nixos-rebuild switch --flake ".#$HOST" --show-trace --verbose
fi
"""

[tasks.add-host]
description = "Register a new host by creating its hosts/ directory (no flake.nix editing needed)"
usage = '''
arg "<hostname>" help="Hostname for the new machine" long_help="Used as both the nix config identifier and the machine hostname. Creates a hosts/<arch>-<class>/<hostname>/ directory from the appropriate template. easy-hosts auto-discovers hosts from the directory structure."
arg "[system]" help="Nix system string (default: current machine)" long_help="Determines the host directory path: <arch>-darwin or <arch>-nixos. Inferred from the current machine if omitted." {
  choices "aarch64-darwin" "x86_64-darwin" "x86_64-linux" "aarch64-linux"
}
'''
run = """
#!/usr/bin/env bash
set -euo pipefail

HOSTNAME="${usage_hostname:?}"

# Default system to current machine if not provided
if [ -n "${usage_system:-}" ]; then
  SYSTEM="${usage_system}"
else
  case "$(uname -s)-$(uname -m)" in
    Darwin-arm64)  SYSTEM="aarch64-darwin" ;;
    Darwin-x86_64) SYSTEM="x86_64-darwin"  ;;
    Linux-x86_64)  SYSTEM="x86_64-linux"   ;;
    Linux-aarch64) SYSTEM="aarch64-linux"   ;;
    *) echo "ERROR: Unsupported platform, please pass system explicitly"; exit 1 ;;
  esac
fi

# Map system string to easy-hosts directory convention
case "$SYSTEM" in
  aarch64-darwin) DIR_PREFIX="aarch64-darwin"; TEMPLATE="darwin" ;;
  x86_64-darwin)  DIR_PREFIX="x86_64-darwin";  TEMPLATE="darwin" ;;
  x86_64-linux)   DIR_PREFIX="x86_64-nixos";   TEMPLATE="nixos"  ;;
  aarch64-linux)  DIR_PREFIX="aarch64-nixos";   TEMPLATE="nixos"  ;;
  *) echo "ERROR: Unknown system '$SYSTEM'"; exit 1 ;;
esac

HOST_DIR="hosts/${DIR_PREFIX}/${HOSTNAME}"
echo "==> Adding $HOSTNAME ($SYSTEM) -> $HOST_DIR"

# Create host directory from appropriate template
if [ -d "$HOST_DIR" ]; then
  echo "WARNING: $HOST_DIR already exists, skipping directory creation."
else
  echo "==> Creating $HOST_DIR from templates/$TEMPLATE..."
  mkdir -p "$HOST_DIR"
  cp -r "templates/$TEMPLATE"/* "$HOST_DIR"/
fi

# On NixOS, auto-copy hardware-configuration.nix if running on the target machine
if [ "$TEMPLATE" = "nixos" ] && [ ! -e "$HOST_DIR/hardware-configuration.nix" ]; then
  if [ -e /etc/nixos/hardware-configuration.nix ]; then
    echo "==> Copying /etc/nixos/hardware-configuration.nix into $HOST_DIR..."
    cp /etc/nixos/hardware-configuration.nix "$HOST_DIR/"
  else
    echo "==> Generating hardware configuration..."
    sudo nixos-generate-config --dir "$HOST_DIR"
    # nixos-generate-config also creates configuration.nix which we don't need
    rm -f "$HOST_DIR/configuration.nix"
  fi
fi

git add -A
git commit -m "chore: add host $HOSTNAME ($SYSTEM)" 2>/dev/null || true

echo ""
echo "Done! '$HOSTNAME' registered as a $TEMPLATE host."
echo "   Directory: $HOST_DIR"
if [ "$TEMPLATE" = "darwin" ]; then
  echo "   To bootstrap the machine, clone this repo on it and run:"
  echo "   ./bootstrap.sh $HOSTNAME"
else
  echo "   Next steps on the target machine:"
  echo "   1. Ensure $HOST_DIR/hardware-configuration.nix is present"
  echo "   2. ./bootstrap.sh $HOSTNAME"
fi
"""

# ---------------------------------------------------------------------------
# Nix maintenance tasks
# ---------------------------------------------------------------------------

[tasks.up]
description = "Update all flake inputs"
run = "nix flake update"

[tasks.upp]
description = "Update a single flake input"
usage = 'arg "<input>" help="Flake input to update (e.g. nixpkgs, home-manager, darwin)"'
run = "nix flake update ${usage_input:?}"

[tasks.history]
description = "List all system profile generations"
run = "nix profile history --profile /nix/var/nix/profiles/system"

[tasks.repl]
description = "Open a nix repl with nixpkgs"
run = "nix repl --expr 'import (builtins.getFlake \"nixpkgs\") {}'"

[tasks.clean]
description = "Remove all profile generations older than 7 days"
run = "sudo nix profile wipe-history --profile /nix/var/nix/profiles/system --older-than 7d"

[tasks.gc]
description = "Garbage-collect all unused nix store entries (system + user)"
run = [
  "sudo nix-collect-garbage --delete-older-than 7d",
  "nix-collect-garbage --delete-older-than 7d",
]

[tasks.fmt]
description = "Format all .nix files in this repo"
run = "nix fmt"

[tasks.iterm-export]
description = "Re-export iTerm2 preferences plist into the repo"
run = """
#!/usr/bin/env bash
set -euo pipefail

SRC="$HOME/Library/Preferences/com.googlecode.iterm2.plist"
DST="config/iterm2/com.googlecode.iterm2.plist"

if [ ! -e "$SRC" ]; then
  echo "ERROR: iTerm2 preferences not found at $SRC"
  exit 1
fi

echo "==> Copying iTerm2 plist into repo..."
cp "$SRC" "$DST"
echo "    Exported to $DST"
echo ""
echo "Review with: git diff --stat"
echo "Then commit: git add -A && git commit -m 'chore: update iTerm2 preferences'"
"""

[tasks.gcroot]
description = "Show auto GC roots in the nix store"
run = "ls -al /nix/var/nix/gcroots/auto/"

[tasks.uninstall]
description = "Completely uninstall Nix from this machine"
confirm = "This will completely remove Nix, the /nix store, and all managed packages. Continue?"
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ -e /nix/nix-installer ]; then
  echo "==> Uninstalling Nix via nix-installer..."
  /nix/nix-installer uninstall
else
  echo "ERROR: /nix/nix-installer not found."
  echo "       Nix may not have been installed via the official nix-installer."
  echo "       Refer to your installer's documentation for removal."
  exit 1
fi

echo ""
echo "Done! Open a new shell to pick up the changes."
"""
