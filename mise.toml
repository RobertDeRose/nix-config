[tasks."test:bootstrap"]
description = "Run Linux bootstrap validation in an Apple container"
depends = ["test:image"]
quiet = true
usage = 'arg "[hostname]" help="Test hostname passed to bootstrap" default="ci-bootstrap"'
run = '''
#!/usr/bin/env bash
set -euo pipefail

NAME="test-bootstrap"
HOSTNAME="${usage_hostname:-ci-bootstrap}"
IMAGE="local/nix-config-test-linux:24.04"
BRANCH="$(git branch --show-current)"
ORIGIN_URL="$(git remote get-url origin)"

if [ -z "$BRANCH" ]; then
  echo "ERROR: test:bootstrap must be run from a named branch."
  exit 1
fi

# Validate branch name doesn't contain URL-breaking characters.
# Note: '/' in branch names is fine — GitHub raw URLs resolve them correctly.
if [[ "$BRANCH" =~ [[:space:]\?\#] ]]; then
  echo "ERROR: Branch name '$BRANCH' contains characters that break URL construction."
  exit 1
fi

case "$ORIGIN_URL" in
  git@github.com:*.git)
    REPO="${ORIGIN_URL#git@github.com:}"
    REPO="${REPO%.git}"
    ;;
  https://github.com/*.git)
    REPO="${ORIGIN_URL#https://github.com/}"
    REPO="${REPO%.git}"
    ;;
  https://github.com/*)
    REPO="${ORIGIN_URL#https://github.com/}"
    ;;
  *)
    echo "ERROR: Unsupported origin URL: $ORIGIN_URL"
    exit 1
    ;;
esac

if ! git rev-parse --verify --quiet "origin/$BRANCH" >/dev/null; then
  echo "WARNING: origin/$BRANCH does not exist yet, so test:bootstrap cannot exercise this branch."
  echo "         Push this branch first, then rerun test:bootstrap."
  exit 1
fi

if ! git diff --quiet || ! git diff --cached --quiet; then
  echo "WARNING: Local changes are not pushed to origin and will not be tested by test:bootstrap."
fi

if git rev-parse --verify --quiet "origin/$BRANCH" >/dev/null && [ "$(git rev-list --count "origin/$BRANCH..HEAD")" -gt 0 ]; then
  echo "WARNING: This branch has local commits not pushed to origin/$BRANCH; they will not be tested."
fi

BOOTSTRAP_URL="https://raw.githubusercontent.com/$REPO/$BRANCH/bootstrap.sh"

echo "==> Recreating Apple container '$NAME'..."
container delete --force "$NAME" >/dev/null 2>&1 || true
container run -d \
  --name "$NAME" \
  --memory 4G \
  --dns 1.1.1.1 \
  --dns 8.8.8.8 \
  "$IMAGE" >/dev/null

echo "==> Running bootstrap validation from $BOOTSTRAP_URL..."
container exec "$NAME" bash -lc "sudo -iu tester bash -lc 'git config --global user.name \"Container Test User\" && git config --global user.email \"tester@localhost\" && export HOME_MANAGER_USER=tester NIX_BUILD_CORES=1 CARGO_BUILD_JOBS=1 NIX_INSTALLER_NO_SANDBOX=true && curl -sSfL \"$BOOTSTRAP_URL\" | bash -s -- \"$HOSTNAME\"'"

echo ""
echo "Bootstrap test completed in container '$NAME'."
'''

[tasks."test:deploy"]
description = "Run Apple Container remote deployment validation"
depends = ["test:image"]
quiet = true
run = '''
#!/usr/bin/env bash
set -euo pipefail

NAME="apple-ssh-test"
IMAGE="local/nix-config-test-linux:24.04"
TARGET="tester"
SSH_KEY="$HOME/.ssh/id_ed25519"
PUBKEY_FILE="$HOME/.ssh/id_ed25519.pub"
PUBKEY_DIR="$(dirname "$PUBKEY_FILE")"
PUBKEY_NAME="$(basename "$PUBKEY_FILE")"
KNOWN_HOSTS="$HOME/.ssh/known_hosts"
REPO_ROOT="$PWD"
STAGE_DIR="$(mktemp -d "${TMPDIR:-/tmp}/nix-config-deploy.XXXXXX")"

cleanup() {
  rm -rf "$STAGE_DIR"
}
trap cleanup EXIT

if [ ! -f "$SSH_KEY" ] || [ ! -f "$PUBKEY_FILE" ]; then
  echo "ERROR: SSH keypair not found at $SSH_KEY / $PUBKEY_FILE"
  exit 1
fi

echo "==> Preparing staged repo copy for deploy test..."
rsync -a --delete \
  --exclude .git \
  --exclude result \
  --exclude .hm-result \
  "$REPO_ROOT/" "$STAGE_DIR/"
git -C "$STAGE_DIR" init -q
git -C "$STAGE_DIR" add -A
mise trust "$STAGE_DIR/mise.toml" >/dev/null
mkdir -p "$STAGE_DIR/systems/aarch64-linux/apple-ssh-test"
cp "$STAGE_DIR/templates/linux/system.nix" "$STAGE_DIR/systems/aarch64-linux/apple-ssh-test/system.nix"
cp "$STAGE_DIR/templates/linux/home.nix" "$STAGE_DIR/systems/aarch64-linux/apple-ssh-test/home.nix"
cat > "$STAGE_DIR/systems/aarch64-linux/apple-ssh-test/user.nix" <<'EOF'
{
  username = "tester";
  fullname = "Container Test User";
  useremail = "tester@localhost";
  githubUsername = "RobertDeRose";
}
EOF
git -C "$STAGE_DIR" add -A

echo "==> Recreating Apple deploy test container '$NAME'..."
container delete --force "$NAME" >/dev/null 2>&1 || true
container run -d \
  --name "$NAME" \
  --dns 1.1.1.1 \
  --dns 8.8.8.8 \
  -v "$PUBKEY_DIR:/workspace/host-ssh" \
  "$IMAGE" >/dev/null

IP="$(container inspect "$NAME" | jq -r '.[0].networks[0].ipv4Address | split("/")[0]')"

echo "==> Installing SSH key for $TARGET@$IP..."
container exec "$NAME" sh -lc "cp /workspace/host-ssh/$PUBKEY_NAME /home/tester/.ssh/authorized_keys && chown tester:tester /home/tester/.ssh/authorized_keys && chmod 600 /home/tester/.ssh/authorized_keys"

echo "==> Waiting for SSH to accept connections..."
SSH_READY=false
for _ in $(seq 1 120); do
  if ssh -i "$SSH_KEY" -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=2 "$TARGET@$IP" true >/dev/null 2>&1; then
    SSH_READY=true
    break
  fi
  sleep 1
done

if [ "$SSH_READY" != true ]; then
  echo "ERROR: SSH on $TARGET@$IP did not become ready in time."
  exit 1
fi

echo "==> Installing Nix on remote test target..."
ssh -i "$SSH_KEY" -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$TARGET@$IP" 'export NIX_INSTALLER_NO_CONFIRM=true NIX_INSTALLER_ENABLE_FLAKES=true; curl -sSfL https://install.lix.systems/lix | sh -s -- install'

echo "==> Configuring trusted-users and PATH on remote target..."
ssh -i "$SSH_KEY" -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$TARGET@$IP" <<'EOF'
sudo sh -lc '
mkdir -p /etc/nix /usr/local/bin
touch /etc/nix/nix.custom.conf
if ! grep -qE "^(extra-)?trusted-users\\b.*\\btester\\b" /etc/nix/nix.conf /etc/nix/nix.custom.conf 2>/dev/null; then
  if grep -q "^extra-trusted-users" /etc/nix/nix.custom.conf; then
    sed -i "s/^extra-trusted-users.*/& tester/" /etc/nix/nix.custom.conf
  else
    printf "extra-trusted-users = tester\\n" >> /etc/nix/nix.custom.conf
  fi
fi
ln -sf /nix/var/nix/profiles/default/bin/nix-store /usr/local/bin/nix-store
ln -sf /nix/var/nix/profiles/default/bin/nix /usr/local/bin/nix
systemctl restart nix-daemon.socket 2>/dev/null || true
systemctl restart nix-daemon.service 2>/dev/null || true
'
EOF

echo "==> Trusting remote host key in local known_hosts..."
touch "$KNOWN_HOSTS"
ssh-keygen -R "$IP" -f "$KNOWN_HOSTS" >/dev/null 2>&1 || true
ssh-keyscan "$IP" >> "$KNOWN_HOSTS"

echo "==> Running deployment test..."
(
  cd "$STAGE_DIR"
  GIT_SSH_COMMAND="ssh -i '$SSH_KEY' -o IdentitiesOnly=yes" mise run nix:deploy "$TARGET@$IP" apple-ssh-test
)

echo ""
echo "Deploy test completed against $TARGET@$IP using container '$NAME'."
'''

