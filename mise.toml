# schema
[settings]
experimental = true
env_shell_expand = true

[tools]
actionlint = "latest"
"aqua:Mic92/nixfmt-rs" = "latest"
codex = "latest"
"github:ctxrs/ctx" = "latest"
"github:peterldowns/nix-search-cli" = "latest"
"github:rust-lang/mdbook" = "latest"
hk = "latest"
jq = "latest"
node = ["24", "lts"]
pkl = "latest"
python = "latest"
shellcheck = "latest"
shfmt = "latest"
tombi = "latest"
usage = "3.5.5"

[env]
HK_MISE = 1

[hooks]
postinstall = "command -v hk >/dev/null && hk install --mise || true"

[task_config]
includes = [".mise/tasks"]
