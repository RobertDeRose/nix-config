# schema
[settings]
experimental = true
env_shell_expand = true

[tools]
hk = { version = "1.41", arch = "aarch64" }
actionlint = "1.7.12"
jq = "latest"
mdbook = "0.5.2"
pkl = "0.31.1"
shellcheck = "0.11.0"
shfmt = "3.13.1"
tombi = "0.9.16"
"nix:nixfmt" = "1.2.0"

[env]
HK_MISE = 1

[hooks]
postinstall = "command -v hk >/dev/null && hk install --mise || true"

[task_config]
includes = [".mise/tasks"]
