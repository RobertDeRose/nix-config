# schema
[settings]
experimental = true
env_shell_expand = true

[tools]
hk = { version = "1.41", arch = "aarch64" }
actionlint = "1.7.12"
jq = "latest"
mdbook = "0.5.2"
pkl = "0.31.1"
shellcheck = "0.11.0"
shfmt = "3.13.1"
tombi = "0.9.16"
"nix:nixfmt" = "1.2.0"

[env]
HK_MISE = 1

[hooks]
postinstall = "command -v hk >/dev/null && hk install --mise || true"

# ---------------------------------------------------------------------------
# Bootstrap & host management
# ---------------------------------------------------------------------------

# Hidden tasks — building blocks for nix:init, individually testable in CI
[tasks.install-nix]
description = "Install Nix via nix-installer if missing"
hide = true
quiet = true
raw = true
run = '''
#!/usr/bin/env bash
set -euo pipefail

REPO_ROOT="$(git rev-parse --show-toplevel)"

# Skip if Nix is already installed
if [ -e /nix/receipt.json ]; then
  echo "Nix is already installed, skipping."
  exit 0
fi

export NIX_INSTALLER_NO_CONFIRM="true"
export NIX_INSTALLER_ENABLE_FLAKES="true"
export NIX_INSTALLER_EXTRA_CONF="trusted-users = root $(whoami)
extra-substituters = https://cache.nixos.org https://nix-community.cachix.org https://cache.numtide.com https://robertderose.cachix.org
extra-trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g= robertderose.cachix.org-1:LGSby4A1Kg1W19IC5AoB3oGhLSgfg1x3j2GF0Ve2hKM="

if [[ "${NIX_INSTALLER_NO_SANDBOX:-false}" == "true" ]]; then
  export NIX_INSTALLER_EXTRA_CONF="$NIX_INSTALLER_EXTRA_CONF
sandbox = false"
fi

[ $(uname -s) = 'Darwin' ] && export NIX_INSTALLER_SSL_CERT_FILE='/etc/ssl/cert.pem'

echo "==> Installing Nix..."
if [ "$(uname -sm)" = "Darwin x86_64" ]; then
  echo "Detected macOS on x86_64. Using nix instead of lix"
  curl -sSfL https://artifacts.nixos.org/nix-installer | bash -s -- install
else
  # Lix installer self-test may warn about daemon socket not being ready yet;
  # this is a known race condition — verify nix works after a short wait.
  lix_rc=0
  curl -sSfL https://install.lix.systems/lix | bash -s -- install || lix_rc=$?
  if [ $lix_rc -ne 0 ]; then
    echo "WARNING: Lix installer exited with code $lix_rc (may be a known race condition — verifying...)"
  fi
fi

# Wait for the daemon socket to come up before continuing
for i in $(seq 1 30); do
  [ -S /nix/var/nix/daemon-socket/socket ] && break
  sleep 1
done

# Source nix and verify it works
set +u
source /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
set -u

if ! nix --version &>/dev/null; then
  echo "ERROR: Nix installed but not functional."
  exit 1
fi
echo "Nix $(nix --version) is ready."
'''

[tasks.github-auth]
description = "Ensure gh CLI is installed and authenticated"
hide = true
quiet = true
run = '''
#!/usr/bin/env bash
set -euo pipefail

# Install gh if not yet available
mise install gh

# Check if already authenticated
if mise x gh -- gh auth status &>/dev/null; then
  echo "GitHub CLI is already authenticated."
  exit 0
fi

echo "==> GitHub CLI is not authenticated."
echo "    Running 'gh auth login' — follow the prompts to authenticate."
mise x gh -- gh auth login
'''

[tasks.add-host]
description = "Scaffold a new host from templates, branch, and commit"
hide = true
quiet = true
raw = true
usage = '''
arg "[hostname]" help="Hostname for the new machine" \
  long_help="Used as both the nix config identifier and the machine hostname. Creates a hosts/<arch>-darwin/<hostname>/ or systems/<arch>-linux/<hostname>/ directory from the appropriate template."
arg "[os]" help="OS class (default: current machine)" {
  choices "darwin" "linux"
}
arg "[arch]" help="Architecture for the new machine (default: current machine)" long_help="Used to determine the host directory path. Inferred from the current machine if omitted." {
  choices "aarch64" "x86_64"
}
flag "--user" help="Username for the host (default: current user)"
flag "--fullname" help="Full name (default: git config user.name)"
flag "--email" help="Email (default: git config user.email)"
flag "--github" help="GitHub username (default: derived from git remote)"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

HOSTNAME="${usage_hostname:-$(hostname -s)}"
OS="${usage_os:-$(uname -s | tr '[A-Z]' '[a-z]')}"
ARCH="${usage_arch:-$(uname -m | sed 's/arm64/aarch64/')}"

if [ "${OS}" != "darwin" ] && [ "${OS}" != "linux" ]; then
  echo "ERROR: invalid os '${OS}'. Expected 'darwin' or 'linux'."
  exit 1
fi

SYSTEM="${ARCH}-${OS}"
HOST_BRANCH="host/${HOSTNAME}"

if [[ "${CI:-false}" != "true" ]]; then
  CURRENT_BRANCH="$(git rev-parse --abbrev-ref HEAD)"
  if [ "$CURRENT_BRANCH" != "$HOST_BRANCH" ]; then
    if git rev-parse --verify "$HOST_BRANCH" &>/dev/null; then
      git checkout "$HOST_BRANCH"
    else
      git checkout -b "$HOST_BRANCH"
    fi
  fi
fi

# Darwin hosts live under hosts/ (managed by easy-hosts);
# Linux hosts live under systems/ (managed by system-manager).
if [ "${OS}" = "darwin" ]; then
  HOST_DIR="hosts/${SYSTEM}/${HOSTNAME}"
else
  HOST_DIR="systems/${SYSTEM}/${HOSTNAME}"
fi

if [ ! -d "${HOST_DIR}" ]; then
  echo "==> Creating ${HOST_DIR} from templates/${OS}..."
  mkdir -p "${HOST_DIR}"
  cp -vr "templates/${OS}"/* "${HOST_DIR}/"
fi

# Generate user.nix for this host
USERNAME="${usage_user:-$(whoami)}"
FULLNAME="${usage_fullname:-$(git config user.name 2>/dev/null || echo "")}"
EMAIL="${usage_email:-$(git config user.email 2>/dev/null || echo "")}"
GITHUB="${usage_github:-$(git remote get-url origin 2>/dev/null | sed -n 's|.*github.com[:/]\([^/]*\)/.*|\1|p' || echo "")}"

# Prompt for any missing required fields (git may not be configured on a fresh machine)
ask() {
  local prompt="$1" reply
  while true; do
    printf "%s" "$prompt" >&2
    read -r reply < /dev/tty
    if [ -n "$reply" ]; then
      echo "$reply"
      return
    fi
    echo "  This field is required. Please enter a value." >&2
  done
}
if [ -z "$FULLNAME" ]; then
  if [[ "${CI:-false}" == "true" ]]; then
    FULLNAME="CI User"
  else
    FULLNAME="$(ask "Full name: ")"
  fi
fi
if [ -z "$EMAIL" ]; then
  if [[ "${CI:-false}" == "true" ]]; then
    EMAIL="ci@localhost"
  else
    EMAIL="$(ask "Email: ")"
  fi
fi
if [ -z "$GITHUB" ]; then
  if [[ "${CI:-false}" == "true" ]]; then
    GITHUB="ci"
  else
    GITHUB="$(ask "GitHub username: ")"
  fi
fi

# Escape a value for safe inclusion in a Nix string literal.
# For this use case, escape backslashes, double quotes, and ${ to prevent interpolation.
nix_escape() {
  local val="$1"
  val="${val//\\/\\\\}"      # backslash → \\
  val="${val//\"/\\\"}"      # double quote → \"
  val="${val//\$\{/\\\$\{}"  # ${ → \${  (prevents interpolation)
  printf '%s' "$val"
}

{
  printf '{\n'
  printf '  username = "%s";\n' "$(nix_escape "$USERNAME")"
  printf '  fullname = "%s";\n' "$(nix_escape "$FULLNAME")"
  printf '  useremail = "%s";\n' "$(nix_escape "$EMAIL")"
  printf '  githubUsername = "%s";\n' "$(nix_escape "$GITHUB")"
  printf '}\n'
} > "${HOST_DIR}/user.nix"
echo "    Generated ${HOST_DIR}/user.nix for user '${USERNAME}'"

# Ensure host files are tracked — nix flakes only see git-tracked files.
git add "${HOST_DIR}"

# Commit the new host files so the flake doesn't see a dirty tree.
if [[ "${CI:-false}" != "true" ]] && ! git diff --cached --quiet -- "${HOST_DIR}"; then
  git_commit_args=(-m "feat: add host ${HOSTNAME} (${SYSTEM})" -- "${HOST_DIR}")
  if git config user.name &>/dev/null && git config user.email &>/dev/null; then
    git commit "${git_commit_args[@]}"
  else
    GIT_AUTHOR_NAME="$FULLNAME" \
    GIT_AUTHOR_EMAIL="$EMAIL" \
    GIT_COMMITTER_NAME="$FULLNAME" \
    GIT_COMMITTER_EMAIL="$EMAIL" \
    git commit "${git_commit_args[@]}"
  fi
fi

echo "
Added '${HOSTNAME}' as a ${OS} host in: ${HOST_DIR}

Next steps — apply the configuration with:
  mise run nix:init ${HOSTNAME}
  # or, if Nix is already installed:
  mise run nix:switch

To push the host branch to origin:
  git push -u origin ${HOST_BRANCH}
"
'''

[tasks.activate]
description = "Activate host config (evaluate-only in CI)"
depends = ["install-nix"]
hide = true
quiet = true
usage = 'arg "[hostname]" help="Hostname to activate"'
run = """
#!/usr/bin/env bash
set -euo pipefail
REPO_ROOT="$(git rev-parse --show-toplevel)"

# Prefer explicit GITHUB_TOKEN, fall back to gh CLI auth if available
if [ -z "${GITHUB_TOKEN:-}" ]; then
  if gh_token="$(mise x gh -- gh auth token 2>/dev/null)"; then
    export GITHUB_TOKEN="$gh_token"
  fi
fi

if [ -n "${GITHUB_TOKEN:-}" ]; then
  export NIX_CONFIG="${NIX_CONFIG:-}"$'\n'"access-tokens = github.com=${GITHUB_TOKEN}"
fi

set +u
source /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
set -u

# Restart the daemon so it picks up trusted-users from nix.conf
# (the installer may have spawned it before the config was finalized)
if [ "$(uname -s)" = "Linux" ]; then
  sudo systemctl restart nix-daemon
fi

NIX_FLAGS=(--accept-flake-config --extra-experimental-features "nix-command flakes")
HOSTNAME="${usage_hostname:-$(hostname -s)}"
if [ "$(uname -s)" = "Darwin" ]; then
  TARGET=("$REPO_ROOT#darwinConfigurations.${HOSTNAME}.system")
else
  TARGET=("$REPO_ROOT#systemConfigs.${HOSTNAME}")
  HOME_TARGET=("$REPO_ROOT#homeConfigurations.${HOSTNAME}.activationPackage")
fi

echo "==> $( [ "${CI:-false}" = "true" ] && echo "Validating" || echo "Deploying" ) configuration for '${HOSTNAME}'..."
if [[ "${CI:-false}" = "true" ]]; then
  # CI validation-only path: evaluate the derivation without building/activating.
  test "$(nix eval "${NIX_FLAGS[@]}" --raw "${TARGET[0]}.type")" = "derivation"
  if [ -n "${HOME_TARGET:-}" ]; then
    test "$(nix eval "${NIX_FLAGS[@]}" --raw "${HOME_TARGET[0]}.type")" = "derivation"
  fi
  echo "CI detected: Evaluation successful. Skipping build and activation steps."
  exit 0
fi

if [ "$(uname -s)" = "Darwin" ]; then
  # Ensure nix.conf exists so the daemon knows who is trusted and which
  # substituters to use.  A previous activate run (or manual intervention)
  # may have moved it aside.  Restore it temporarily for the build step;
  # we'll move everything aside again before darwin-rebuild takes ownership.
  if [ ! -f /etc/nix/nix.conf ] && [ -f /etc/nix/nix.conf.before-nix-darwin ]; then
    echo "==> Restoring /etc/nix/nix.conf for build step..."
    sudo cp /etc/nix/nix.conf.before-nix-darwin /etc/nix/nix.conf
    sudo launchctl kickstart -k system/org.nixos.nix-daemon
    sleep 2
  fi

  nix build "${NIX_FLAGS[@]}" --out-link "$REPO_ROOT/result" "${TARGET[@]}"

  # nix-darwin refuses to activate if /etc/nix/ contains config files it didn't
  # write.  On first run (or after a Lix/Nix re-install), move them aside so
  # nix-darwin can take ownership.  The settings from these files will be
  # managed by nix-darwin's nix.settings going forward.
  for f in /etc/nix/nix.conf; do
    if [ -f "$f" ] && ! grep -qF 'nix-darwin' "$f" 2>/dev/null; then
      echo "==> Moving $f aside for nix-darwin first-run..."
      sudo mv "$f" "$f.before-nix-darwin"
    fi
  done
  # nix.custom.conf is created by nix:trust and is never managed by nix-darwin.
  # Only move it aside on first-run; once nix-darwin owns the system it manages
  # trusted-users and substituters via nix.settings.
  if [ ! -e /run/current-system/darwin-version ] && [ -f /etc/nix/nix.custom.conf ]; then
    echo "==> Moving /etc/nix/nix.custom.conf aside for nix-darwin first-run..."
    sudo mv /etc/nix/nix.custom.conf /etc/nix/nix.custom.conf.before-nix-darwin
  fi

  echo "==> Activating configuration..."
  sudo "$REPO_ROOT/result/sw/bin/darwin-rebuild" switch --flake "$REPO_ROOT#${HOSTNAME}"
else
  echo "==> Activating system configuration..."
  nix build "${NIX_FLAGS[@]}" --out-link "$REPO_ROOT/result" "$REPO_ROOT#system-manager"
  "$REPO_ROOT/result/bin/system-manager" switch --flake "$REPO_ROOT#${HOSTNAME}" --sudo

  echo "==> Activating home-manager configuration..."
  nix build "${NIX_FLAGS[@]}" "${HOME_TARGET[@]}" --out-link "$REPO_ROOT/.hm-result"
  ACTIVATE_USER="${HOME_MANAGER_USER:-${USER:-$(whoami)}}"
  ACTIVATE_HOME="$(getent passwd "$ACTIVATE_USER" | cut -d: -f6)"
  ACTIVATE_PATH="/nix/var/nix/profiles/default/bin:/run/current-system/sw/bin:$PATH"
  if [ -z "$ACTIVATE_HOME" ]; then
    ACTIVATE_HOME="/home/$ACTIVATE_USER"
  fi
  sudo install -d -m755 -o "$ACTIVATE_USER" -g "$(id -gn "$ACTIVATE_USER")" "/nix/var/nix/profiles/per-user/$ACTIVATE_USER"
  if [ "$(id -un)" = "$ACTIVATE_USER" ]; then
    USER="$ACTIVATE_USER" HOME="$ACTIVATE_HOME" PATH="$ACTIVATE_PATH" HOME_MANAGER_BACKUP_EXT=hm_bak "$REPO_ROOT/.hm-result/activate"
  else
    sudo -u "$ACTIVATE_USER" env USER="$ACTIVATE_USER" HOME="$ACTIVATE_HOME" PATH="$ACTIVATE_PATH" HOME_MANAGER_BACKUP_EXT=hm_bak "$REPO_ROOT/.hm-result/activate"
  fi
fi

# Suggest pushing the host branch to origin after a successful activation.
if [[ "${CI:-false}" != "true" ]]; then
  BRANCH="$(git rev-parse --abbrev-ref HEAD 2>/dev/null || true)"
  if [[ "$BRANCH" == host/* ]] && ! git rev-parse --verify "origin/${BRANCH}" &>/dev/null; then
    echo ""
    echo "==> Activation successful! To push this host branch to origin, run:"
    echo "    git push -u origin ${BRANCH}"
  fi
fi
"""

# ---------------------------------------------------------------------------
# Public nix tasks
# ---------------------------------------------------------------------------

[tasks."nix:init"]
description = "Full init for a new machine: install Nix, then apply config (Homebrew is managed by nix-darwin)"
depends = ["nix:trust"]
quiet = true
raw = true
usage = '''
arg "<hostname>" help="Hostname to assign" long_help="The hostname used as the nix config identifier. Delegates to add-host to create the host directory, then installs prerequisites (Nix, Homebrew) and builds/activates the configuration."
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

mise run add-host "${usage_hostname}"
mise run activate "${usage_hostname}"

echo ""
echo "Done! Open a new shell to pick up all changes."
'''

[tasks."nix:switch"]
description = "Apply the nix config for the current host (auto-detects Darwin or Linux)"
quiet = true
usage = '''
flag "-d --debug" help="Show verbose output and nix traces for debugging"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail
HOST="$(hostname -s)"
REPO_ROOT="$(git rev-parse --show-toplevel)"

# Prefer explicit GITHUB_TOKEN, fall back to gh CLI auth if available
if [ -z "${GITHUB_TOKEN:-}" ]; then
  if gh_token="$(mise x gh -- gh auth token 2>/dev/null)"; then
    export GITHUB_TOKEN="$gh_token"
  fi
fi

if [ -n "${GITHUB_TOKEN:-}" ]; then
  export NIX_CONFIG="${NIX_CONFIG:-}"$'\n'"access-tokens = github.com=${GITHUB_TOKEN}"
fi

# Use an array for optional flags
NIX_FLAGS=(--accept-flake-config --extra-experimental-features "nix-command flakes")
REBUILD_FLAGS=()
if [[ "${usage_debug:-}" == "true" ]]; then
  NIX_FLAGS+=("--show-trace" "--verbose")
  REBUILD_FLAGS+=("--show-trace" "--verbose")
fi

echo ""
if [ "$(uname -s)" = "Darwin" ]; then
  sudo darwin-rebuild switch --flake "$REPO_ROOT#$HOST" "${REBUILD_FLAGS[@]}"
else
  nix build "${NIX_FLAGS[@]}" --out-link "$REPO_ROOT/result" "$REPO_ROOT#system-manager"
  "$REPO_ROOT/result/bin/system-manager" switch --flake "$REPO_ROOT#$HOST" --sudo
  nix build "${NIX_FLAGS[@]}" "$REPO_ROOT#homeConfigurations.$HOST.activationPackage" --out-link "$REPO_ROOT/.hm-result"
  ACTIVATE_USER="${HOME_MANAGER_USER:-${USER:-$(whoami)}}"
  ACTIVATE_HOME="$(getent passwd "$ACTIVATE_USER" | cut -d: -f6)"
  ACTIVATE_PATH="/nix/var/nix/profiles/default/bin:/run/current-system/sw/bin:$PATH"
  if [ -z "$ACTIVATE_HOME" ]; then
    ACTIVATE_HOME="/home/$ACTIVATE_USER"
  fi
  sudo install -d -m755 -o "$ACTIVATE_USER" -g "$(id -gn "$ACTIVATE_USER")" "/nix/var/nix/profiles/per-user/$ACTIVATE_USER"
  if [ "$(id -un)" = "$ACTIVATE_USER" ]; then
    USER="$ACTIVATE_USER" HOME="$ACTIVATE_HOME" PATH="$ACTIVATE_PATH" HOME_MANAGER_BACKUP_EXT=hm_bak "$REPO_ROOT/.hm-result/activate"
  else
    sudo -u "$ACTIVATE_USER" env USER="$ACTIVATE_USER" HOME="$ACTIVATE_HOME" PATH="$ACTIVATE_PATH" HOME_MANAGER_BACKUP_EXT=hm_bak "$REPO_ROOT/.hm-result/activate"
  fi
fi
'''

[tasks."nix:debug"]
description = "Apply config with debug traces"
quiet = true
run = "mise run nix:switch --debug"

[tasks."nix:dry-run"]
description = "Dry-run a nix build target or the current host config"
quiet = true
usage = '''
arg "[target]" help="Flake target to dry-run (example: .#packages.aarch64-darwin.default). Defaults to the current host system target."
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

TARGET="${usage_target:-}"
NIX_FLAGS=(--accept-flake-config --extra-experimental-features "nix-command flakes")

if [ -z "$TARGET" ]; then
  HOST="$(hostname -s)"
  if [ "$(uname -s)" = "Darwin" ]; then
    TARGET=".#darwinConfigurations.${HOST}.system"
  else
    TARGET=".#systemConfigs.${HOST}"
  fi
fi

echo "==> Dry-running $TARGET"
nix build "${NIX_FLAGS[@]}" --dry-run -L "$TARGET"
'''

[tasks."nix:check-cache"]
description = "Check whether a drv or output path exists in configured substituters"
quiet = true
usage = '''
arg "<path>" help="A .drv path or output path under /nix/store"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

STORE_PATH="${usage_path}"

if [[ "$STORE_PATH" == *.drv ]]; then
  TARGETS="$(nix derivation show "$STORE_PATH" | jq -r 'to_entries[0].value.outputs | to_entries[] | .value.path')"
else
  TARGETS="$STORE_PATH"
fi

SUBSTITUTERS="$(nix config show --json | jq -r '.substituters.value[]')"

while IFS= read -r target; do
  [ -n "$target" ] || continue
  echo "==> $target"
  while IFS= read -r store; do
    [ -n "$store" ] || continue
    if nix path-info --store "$store" "$target" >/dev/null 2>&1; then
      echo "HIT  $store"
    else
      echo "MISS $store"
    fi
  done <<< "$SUBSTITUTERS"
  echo ""
done <<< "$TARGETS"
'''

[tasks."nix:deploy"]
description = "Build locally and deploy system config to a remote Linux host via SSH"
quiet = true
usage = '''
arg "<host>" help="SSH target (e.g. rderose@192.168.1.10 or an SSH config alias)"
arg "[name]" help="System config name (defaults to remote hostname)"
flag "-d --debug" help="Show verbose output and nix traces for debugging"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

TARGET_HOST="${usage_host}"
CONFIG_NAME="${usage_name:-}"

# If no config name given, resolve it from the remote hostname
if [ -z "$CONFIG_NAME" ]; then
  CONFIG_NAME="$(ssh "$TARGET_HOST" hostname -s)"
  echo "==> Detected remote hostname: $CONFIG_NAME"
fi

NIX_FLAGS=(--accept-flake-config --extra-experimental-features "nix-command flakes")
if [[ "${usage_debug:-}" == "true" ]]; then
  NIX_FLAGS+=("--show-trace" "--verbose")
fi

echo "==> Building system-manager from flake..."
nix build "${NIX_FLAGS[@]}" ".#system-manager"

echo "==> Deploying system config '$CONFIG_NAME' to $TARGET_HOST..."
./result/bin/system-manager \
  --target-host "$TARGET_HOST" \
  switch \
  --flake ".#$CONFIG_NAME" \
  --sudo
'''

# ---------------------------------------------------------------------------
# Nix maintenance tasks
# ---------------------------------------------------------------------------

[tasks."nix:trust"]
description = "Add the current user to nix trusted-users and restart the daemon"
depends = ["install-nix"]
quiet = true
raw = true
run = '''
#!/usr/bin/env bash
set -euo pipefail

# CI runners are already trusted; skip to avoid sudo prompts.
[[ "${CI:-false}" == "true" ]] && exit 0

USER="$(whoami)"
CONF="/etc/nix/nix.custom.conf"
USER_REGEX="$(printf '%s' "$USER" | sed 's/[][(){}.^$*+?|\\-]/\\&/g')"

# Ensure the file exists (nix.conf already includes it via !include)
if [ ! -f "$CONF" ]; then
  echo "==> Creating $CONF..."
  echo "# Custom nix settings" | sudo tee "$CONF" > /dev/null
fi

# Check if the user is already trusted in any nix config file
for f in /etc/nix/nix.conf "$CONF"; do
  if [ -f "$f" ] && grep -qE "^(extra-)?trusted-users\b.*\b${USER_REGEX}\b" "$f" 2>/dev/null; then
    echo "'$USER' is already a trusted user."
    exit 0
  fi
done

# Append to existing extra-trusted-users line, or create one
if grep -qE "^extra-trusted-users\b" "$CONF" 2>/dev/null; then
  echo "==> Adding '$USER' to existing extra-trusted-users..."
  tmp_conf="$(mktemp)"
  trap 'rm -f "$tmp_conf"' EXIT
  sudo awk -v user="$USER" '
    /^extra-trusted-users[[:space:]]*=/ { print $0 " " user; next }
    { print }
  ' "$CONF" > "$tmp_conf"
  sudo install -m 0644 "$tmp_conf" "$CONF"
else
  echo "==> Adding extra-trusted-users line for '$USER'..."
  echo "extra-trusted-users = ${USER}" | sudo tee -a "$CONF" > /dev/null
fi

echo "==> Restarting nix daemon..."
if [ "$(uname -s)" = "Darwin" ]; then
  sudo launchctl kickstart -k system/org.nixos.nix-daemon
else
  sudo systemctl restart nix-daemon
fi

echo "Done. '$USER' is now a trusted nix user."
'''

[tasks."nix:up"]
description = "Update a single flake input, or all inputs if none specified"
quiet = true
usage = 'arg "[input]" help="Flake input to update (e.g. nixpkgs, home-manager, darwin). Omit to update all."'
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ -n "${usage_input:-}" ]; then
  nix flake update "${usage_input}"
else
  nix flake update
fi
'''

[tasks."nix:history"]
description = "List all system profile generations"
quiet = true
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ -e /nix/var/nix/profiles/system-manager-profiles/system-manager ]; then
  PROFILE="/nix/var/nix/profiles/system-manager-profiles/system-manager"
elif [ -e /nix/var/nix/profiles/system ]; then
  PROFILE="/nix/var/nix/profiles/system"
else
  echo "ERROR: no system profile found under /nix/var/nix/profiles/"
  exit 1
fi

sudo -H nix-env --list-generations --profile "$PROFILE"
'''

[tasks."nix:repl"]
description = "Open a nix repl with nixpkgs"
quiet = true
run = "nix repl --expr 'import (builtins.getFlake \"nixpkgs\") {}'"

[tasks."nix:clean"]
description = "Remove system generations older than a retention window"
quiet = true
usage = 'arg "[older_than]" help="Retention window (examples: 7d, 30d, 4w)" default="7d"'
run = '''
#!/usr/bin/env bash
set -euo pipefail

OLDER_THAN="${usage_older_than:-7d}"

if [ -e /nix/var/nix/profiles/system-manager-profiles/system-manager ]; then
  PROFILE="/nix/var/nix/profiles/system-manager-profiles/system-manager"
elif [ -e /nix/var/nix/profiles/system ]; then
  PROFILE="/nix/var/nix/profiles/system"
else
  echo "ERROR: no system profile found under /nix/var/nix/profiles/"
  exit 1
fi

echo "==> Removing old system generations..."
sudo -H nix-env --delete-generations "$OLDER_THAN" --profile "$PROFILE"
'''

