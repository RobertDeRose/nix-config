"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 750
continuation_prompt = "[в”Ӯ ](fg:overlay0)"
format = """
[в•ӯв”Җ](fg:overlay0)$os$username$hostname$directory$git_branch$git_status$nix_shell$package$c$golang$nodejs$python$rust$cmd_duration$shell$time$status$jobs
[в•°в”Җ](fg:overlay0)$character"""
palette = "catppuccin_macchiato"
right_format = ""
scan_timeout = 30

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"

[os]
disabled = false
format = "[оӮ¶](fg:blue)[$symbol](fg:base bg:blue)[оӮҙ](fg:blue) "

[os.symbols]
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = "пҢғ"
CentOS = "пҢ„"
Debian = "пҢҶ"
EndeavourOS = "пҢў"
Fedora = "пҢҠ"
FreeBSD = "пҢҢ"
Garuda = "п…ј"
Gentoo = "пҢҚ"
Linux = "п…ј"
Macos = "пҢӮ"
Manjaro = "пҢ’"
Mariner = "п…ј"
Mint = "пҢҺ"
NetBSD = "п…ј"
NixOS = "пҢ“"
OpenBSD = "пҢЁ"
OpenCloudOS = "о®Ә"
openEuler = "п…ј"
openSUSE = "пҢ”"
OracleLinux = "вҠӮвҠғ"
Pop = "пҢӘ"
Raspbian = "пҢ•"
Redhat = "пҢ–"
RedHatEnterprise = "пҢ–"
Solus = "пҢӯ"
SUSE = "пҢ”"
Ubuntu = "пҢӣ"
Unknown = "п„Ҳ"
Windows = "оңҸ"

[username]
format = "[оӮ¶](fg:mauve)[пҖҮ](fg:base bg:mauve)[оӮҙ](fg:mauve bg:surface0)[ $user](fg:text bg:surface0)[оӮҙ](fg:surface0) "
show_always = true

[hostname]
format = "[оӮ¶](fg:sapphire)[у°’Ӣ](fg:base bg:sapphire)[оӮҙ](fg:sapphire bg:surface0)[ $hostname](fg:text bg:surface0)[оӮҙ](fg:surface0) "
ssh_only = true
trim_at = "."

[directory]
format = "[оӮ¶](fg:blue)[пҒ»](fg:base bg:blue)[оӮҙ](fg:blue bg:surface0)[ $path](fg:text bg:surface0)[$read_only](fg:red bg:surface0)[оӮҙ](fg:surface0) "
home_symbol = "~"
read_only = " пҖЈ"
read_only_style = ""
truncate_to_repo = false
truncation_length = 4
truncation_symbol = "вҖҰ/"

[git_branch]
format = "[оӮ¶](fg:green)[пҗҳ](fg:base bg:green)[оӮҙ](fg:green bg:surface0)[ $branch](fg:text bg:surface0)[оӮҙ](fg:surface0) "
symbol = ""
truncation_length = 36
truncation_symbol = "вҖҰ"

[git_status]
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
conflicted = "=${count}"
deleted = "Г—${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
format = "[оӮ¶](fg:yellow)[пҒұ](fg:base bg:yellow)[оӮҙ](fg:yellow bg:surface0)[ $all_status$ahead_behind](fg:text bg:surface0)[оӮҙ](fg:surface0) "
modified = "!${count}"
renamed = "В»${count}"
staged = "+${count}"
stashed = "вүЎ${count}"
untracked = "?${count}"
up_to_date = ""

[nix_shell]
format = "[оӮ¶](fg:mauve)[$symbol](fg:base bg:mauve)[оӮҙ](fg:mauve bg:surface0)[ $state( $name)](fg:text bg:surface0)[оӮҙ](fg:surface0) "
heuristic = true
impure_msg = "impure"
pure_msg = "pure"
symbol = "пҢ“"
unknown_msg = "shell"

[package]
format = "[оӮ¶](fg:pink)[$symbol](fg:base bg:pink)[оӮҙ](fg:pink bg:surface0)[ $version](fg:text bg:surface0)[оӮҙ](fg:surface0) "
symbol = "у°Ҹ—"

[c]
format = "[оӮ¶](fg:sapphire)[$symbol](fg:base bg:sapphire)[оӮҙ](fg:sapphire bg:surface0)[ $version](fg:text bg:surface0)[оӮҙ](fg:surface0) "
symbol = "оҳһ"

[golang]
format = "[оӮ¶](fg:sky)[$symbol](fg:base bg:sky)[оӮҙ](fg:sky bg:surface0)[ $version](fg:text bg:surface0)[оӮҙ](fg:surface0) "
symbol = "оҳ§"

[nodejs]
format = "[оӮ¶](fg:green)[$symbol](fg:base bg:green)[оӮҙ](fg:green bg:surface0)[ $version](fg:text bg:surface0)[оӮҙ](fg:surface0) "
symbol = "оңҳ"

[python]
format = "[оӮ¶](fg:yellow)[$symbol](fg:base bg:yellow)[оӮҙ](fg:yellow bg:surface0)[ ${pyenv_prefix}${version}( $virtualenv)](fg:text bg:surface0)[оӮҙ](fg:surface0) "
symbol = "оңј"

[rust]
format = "[оӮ¶](fg:peach)[$symbol](fg:base bg:peach)[оӮҙ](fg:peach bg:surface0)[ $version](fg:text bg:surface0)[оӮҙ](fg:surface0) "
symbol = "оһЁ"

[cmd_duration]
format = "[оӮ¶](fg:peach)[уұҺ«](fg:base bg:peach)[оӮҙ](fg:peach bg:surface0)[ $duration](fg:text bg:surface0)[оӮҙ](fg:surface0) "
min_time = 1000
show_milliseconds = false


[shell]
bash_indicator = "bash"
disabled = false
fish_indicator = "fish"
format = "[оӮ¶](fg:teal)[п’ү](fg:base bg:teal)[оӮҙ](fg:teal bg:surface0)[ $indicator](fg:text bg:surface0)[оӮҙ](fg:surface0) "
ion_indicator = "ion"
powershell_indicator = "pwsh"
unknown_indicator = "shell"
xonsh_indicator = "xonsh"
zsh_indicator = "zsh"

[time]
disabled = false
format = "[оӮ¶](fg:rosewater)[пҖ—](fg:base bg:rosewater)[оӮҙ](fg:rosewater bg:surface0)[ $time](fg:text bg:surface0)[оӮҙ](fg:surface0) "
time_format = "%H:%M"

[status]
disabled = false
format = "[оӮ¶](fg:red)[$symbol](fg:base bg:red)[оӮҙ](fg:red bg:surface0)[ $status](fg:text bg:surface0)[оӮҙ](fg:surface0) "
map_symbol = true
not_executable_symbol = "пҒһ"
not_found_symbol = "пҖӮ"
recognize_signal_code = true
sigint_symbol = "у°ңә"
signal_symbol = "пғ§"
symbol = "пҖҚ"

[jobs]
format = "[оӮ¶](fg:lavender)[$symbol](fg:base bg:lavender)[оӮҙ](fg:lavender bg:surface0)[ $number](fg:text bg:surface0)[оӮҙ](fg:surface0) "
number_threshold = 1
symbol = "пҖ“"
symbol_threshold = 1

[character]
error_symbol = "[вқҜ](bold red)"
format = "$symbol "
success_symbol = "[вқҜ](bold green)"
vimcmd_replace_one_symbol = "[вқ®](bold peach)"
vimcmd_replace_symbol = "[вқ®](bold peach)"
vimcmd_symbol = "[вқ®](bold lavender)"
vimcmd_visual_symbol = "[вқ®](bold yellow)"
