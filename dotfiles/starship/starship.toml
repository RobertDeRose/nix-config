"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 750
continuation_prompt = "[в”Ӯ ](fg:overlay0)"
format = """
[в•ӯв”Җ](fg:overlay0)\
[оӮ¶](fg:surface0)\
$os\
$username\
$hostname\
[оӮ°](fg:surface0 bg:surface1)\
$directory\
$git_branch\
$git_status\
$nix_shell\
$package\
$c\
$golang\
$nodejs\
$python\
$rust\
[оӮ°](fg:surface1 bg:surface2)\
$cmd_duration\
$time\
$jobs\
[ ](bg:surface2)\
[оӮҙ](fg:surface2)
[в•°в”Җ](fg:overlay0)$character"""
palette = "catppuccin_macchiato"
right_format = ""
scan_timeout = 30

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"

[os]
disabled = false
format = "[ $symbol](fg:mauve bg:surface0)"

[os.symbols]
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = "пҢғ"
CentOS = "пҢ„"
Debian = "пҢҶ"
EndeavourOS = "пҢў"
Fedora = "пҢҠ"
FreeBSD = "пҢҢ"
Garuda = "п…ј"
Gentoo = "пҢҚ"
Linux = "п…ј"
Macos = "пҢӮ"
Manjaro = "пҢ’"
Mariner = "п…ј"
Mint = "пҢҺ"
NetBSD = "п…ј"
NixOS = "пҢ“"
OpenBSD = "пҢЁ"
OpenCloudOS = "о®Ә"
openEuler = "п…ј"
openSUSE = "пҢ”"
OracleLinux = "вҠӮвҠғ"
Pop = "пҢӘ"
Raspbian = "пҢ•"
Redhat = "пҢ–"
RedHatEnterprise = "пҢ–"
Solus = "пҢӯ"
SUSE = "пҢ”"
Ubuntu = "пҢӣ"
Unknown = "п„Ҳ"
Windows = "оңҸ"

[username]
format = "[ $user](fg:text bg:surface0)"
show_always = true

[hostname]
format = "[@$hostname ](fg:sapphire bg:surface0)"
ssh_only = true
trim_at = "."

[directory]
format = "[ пҒ»](fg:blue bg:surface1)[ $path](fg:text bg:surface1)[$read_only](fg:red bg:surface1)"
home_symbol = "~"
read_only = " пҖЈ"
read_only_style = ""
truncate_to_repo = false
truncation_length = 4
truncation_symbol = "вҖҰ/"

[git_branch]
format = "[ пҗҳ](fg:green bg:surface1)[ $branch](fg:text bg:surface1)"
symbol = ""
truncation_length = 36
truncation_symbol = "вҖҰ"

[git_status]
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
conflicted = "=${count}"
deleted = "Г—${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
format = "[ $all_status$ahead_behind](fg:yellow bg:surface1)"
modified = "!${count}"
renamed = "В»${count}"
staged = "+${count}"
stashed = "вүЎ${count}"
untracked = "?${count}"
up_to_date = ""

[nix_shell]
format = "[ $symbol](fg:mauve bg:surface1)[ $state( $name)](fg:subtext1 bg:surface1)"
heuristic = true
impure_msg = "impure"
pure_msg = "pure"
symbol = "пҢ“"
unknown_msg = "shell"

[package]
format = "[ $symbol](fg:pink bg:surface1)[ $version](fg:subtext1 bg:surface1)"
symbol = "у°Ҹ—"

[c]
format = "[ $symbol](fg:sapphire bg:surface1)[ $version](fg:subtext1 bg:surface1)"
symbol = "оҳһ"

[golang]
format = "[ $symbol](fg:sky bg:surface1)[ $version](fg:subtext1 bg:surface1)"
symbol = "оҳ§"

[nodejs]
format = "[ $symbol](fg:green bg:surface1)[ $version](fg:subtext1 bg:surface1)"
symbol = "оңҳ"

[python]
format = "[ $symbol](fg:yellow bg:surface1)[ ${pyenv_prefix}${version}( $virtualenv)](fg:subtext1 bg:surface1)"
symbol = "оңј"

[rust]
format = "[ $symbol](fg:peach bg:surface1)[ $version](fg:subtext1 bg:surface1)"
symbol = "оһЁ"

[cmd_duration]
format = "[ уұҺ«](fg:peach bg:surface2)[ $duration](fg:subtext1 bg:surface2)"
min_time = 1000
show_milliseconds = false

[time]
disabled = false
format = "[ пҖ—](fg:rosewater bg:surface2)[ $time](fg:text bg:surface2)"
time_format = "%H:%M"

[jobs]
format = "[ пҖ“](fg:lavender bg:surface2)[ $number](fg:subtext1 bg:surface2)"
number_threshold = 1
symbol = ""
symbol_threshold = 1

[character]
error_symbol = '[\$](bold red)'
format = "$symbol "
success_symbol = '[\$](bold green)'
vimcmd_replace_one_symbol = "[вқ®](bold peach)"
vimcmd_replace_symbol = "[вқ®](bold peach)"
vimcmd_symbol = "[вқ®](bold lavender)"
vimcmd_visual_symbol = "[вқ®](bold yellow)"
