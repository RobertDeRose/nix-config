theme = "ayu_mirage"

[editor]
line-number = "relative"
mouse = true
color-modes = true
cursorline = true
completion-timeout = 80
true-color = true
auto-save = false
auto-format = true
bufferline = "multiple"
rulers = [100, 120]

[editor.soft-wrap]
enable = false

[keys.normal]
C-s = ":w"
C-p = "file_picker"
C-b = "file_explorer"
"C-/" = "toggle_comments"
A-up = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]
A-down = ["extend_to_line_bounds", "delete_selection", "paste_after"]
